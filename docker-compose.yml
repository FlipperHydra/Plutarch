# Plutarch runs alongside its own Ollama instance in an internal Docker
# network. Nothing is exposed to the host LAN except Plutarch's own web
# UI on port 8000; the Ollama daemon is reachable only from other
# services on the `plutarch_net` bridge network. This avoids binding
# Ollama to 0.0.0.0 on the host, which would expose the model API to any
# device on the local network.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: plutarch-ollama
    # No `ports:` block on purpose — keeping Ollama container-internal is
    # the whole security point. If you ever need to hit it from the host
    # for debugging, add `ports: ["127.0.0.1:11434:11434"]` (loopback
    # binding, not 0.0.0.0).
    volumes:
      - ollama_data:/root/.ollama  # persistent model store
    networks:
      - plutarch_net
    restart: unless-stopped
    # GPU acceleration is intentionally DISABLED by default. Requesting
    # an NVIDIA device the runtime can't actually deliver (e.g. Docker
    # Desktop on Windows without a working WSL2 CUDA passthrough) causes
    # Ollama to fall into a hybrid "GPU-shaped buffers in system RAM"
    # code path where a small 270M model at ctx=16384 balloons to ~7 GB
    # RSS. Confirmed on this project by comparing `ollama ps` (which
    # reports 100% GPU) against `nvidia-smi` (no gpu) — Ollama labels
    # the runner GPU even when the buffers landed on host RAM.
    #
    # If you have a working NVIDIA setup with the Container Toolkit,
    # uncomment the block below and verify with `docker compose exec
    # ollama nvidia-smi` before trusting the label.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      # Use `ollama list` as the readiness probe. The upstream
      # ollama/ollama image is Ubuntu-based but ships without curl or
      # wget, so an HTTP-based healthcheck would need extra tooling. The
      # `ollama` CLI is already in the image and talks to the local
      # daemon over the same socket the API uses, so a successful list
      # is equivalent to "the daemon is up and serving requests".
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12       # ~2 min grace for cold start
      start_period: 10s

  plutarch:
    build: .
    image: plutarch:latest
    container_name: plutarch
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      PLUTARCH_DATA_DIR: /app/data
      # Talk to the sidecar Ollama over the internal network. `ollama` is
      # the Compose service name and resolves via Docker's built-in DNS.
      # No host binding required, no port exposed to the LAN.
      OLLAMA_HOST: http://ollama:11434
      # Right-sized for a local notes assistant on small models. The KV
      # cache scales linearly with num_ctx, so dropping from 16384 to
      # 2048 cuts Ollama's resident memory roughly 8x. System prompt +
      # tool prompt run ~600 tokens; compaction fires at 1200 to leave
      # ~800 tokens of headroom for the incoming user message plus a
      # tool round-trip before we bump the window.
      PLUTARCH_NUM_CTX: "2048"
      PLUTARCH_COMPACT_THRESHOLD: "1200"
    volumes:
      - plutarch_data:/app/data
    networks:
      - plutarch_net
    restart: unless-stopped

networks:
  plutarch_net:
    driver: bridge

volumes:
  plutarch_data:
  ollama_data:
